<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly International Geo Call</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #23004C;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER */
        .header {
            height: 15vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-title .title-sub {
            font-size: 17px;
            letter-spacing: 4px;
            color: #00d4ff;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .header-title .title-main {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .clocks-row {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .clock-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .clock-label {
            font-size: 10px;
            color: #aaa;
            text-align: center;
            width: 90px;
            height: 28px; /* 항상 2줄의 높이를 확보하여 하단 정렬 유지 */
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
            overflow: hidden;
            word-break: keep-all;
        }

        .clock-time {
            font-size: 12px;
            color: #00d4ff;
            font-weight: 600;
        }

        /* TIMELINE */
        .timeline {
            height: 8vh;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 30px;
            position: relative;
        }

        .timeline-line {
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            z-index: 0;
        }

        .timeline-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            z-index: 1;
        }

        .step-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #1a1a2e;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
        }

        .step-label {
            font-size: 11px;
            color: #666;
            text-align: center;
            max-width: 80px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .timeline-step.active .step-dot {
            border-color: #00d4ff;
            color: #00d4ff;
            box-shadow: 0 0 15px rgba(0,212,255,0.5);
        }

        .timeline-step.done .step-dot {
            background: #22c55e;
            border-color: #22c55e;
            color: white;
        }

        /* CARD GRID */
        .card-grid {
            height: 62vh;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            padding: 0 1.5rem 8px;
        }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: not-allowed;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .card.enabled {
            cursor: pointer;
        }

        .card.enabled:hover {
            background: rgba(255,255,255,0.07);
            transform: translateY(-2px);
        }

        .card.active {
            border-width: 1.5px;
            box-shadow: 0 0 25px rgba(0,212,255,0.25);
        }

        .card.paused {
            opacity: 0.85;
        }

        .card.done {
            opacity: 0.65;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-num {
            font-size: 15px;
            font-weight: 800;
            color: rgba(255,255,255,0.25);
            letter-spacing: 2px;
        }

        .card-badge {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            color: #888;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
            color: #fff;
        }

        .card-presenter {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
        }

        /* PHOTO AVATAR STYLES */
        .avatar-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        .avatar-group {
            display: flex;
            align-items: center;
        }

        .avatar-img-2 {
            margin-left: -10px;
            border: 2px solid #060b14;
        }

        .avatar-wrap {
            display: flex;
            align-items: center;
        }

        .card-presenter span {
            font-size: 16px;
            color: #bbb;
        }

        /* TIMING STATS ROW */
        .card-stats {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 2px;
        }

        .card-mins {
            font-size: 15px;
            color: #666;
        }

        .card-time {
            font-size: 13px;
            font-weight: 700;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .bar-wrap {
            margin-top: auto;
        }

        .bar-bg {
            position: relative;
            height: 26px;
            background: rgba(255,255,255,0.06);
            border-radius: 13px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 13px;
            transition: width 1s linear, background 0.5s;
        }

        .bar-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
            pointer-events: none;
        }

        /* AUTO-PROGRESS OVERLAY */
        .auto-progress-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 212, 255, 0.9);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            z-index: 10;
        }

        /* CONTROLS */
        .controls {
            height: 10vh;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        button {
            padding: 10px 28px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        #startBtn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
        }

        #pauseBtn {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #resetBtn {
            background: rgba(255,255,255,0.05);
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #autoBtn {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid #22c55e;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        button:not(:disabled):hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <div class="title-sub">AGENDA</div>
                <div class="title-main">Monthly International Geo Call</div>
            </div>
            <div class="clocks-row" id="clocksContainer">
                </div>
        </div>

        <div class="timeline">
            <div class="timeline-line"></div>
            <div class="timeline-step step" data-step="0">
                <div class="step-dot">1</div>
                <div class="step-label">Top of Mind</div>
            </div>
            <div class="timeline-step step" data-step="1">
                <div class="step-dot">2</div>
                <div class="step-label">P&C Roadmap</div>
            </div>
            <div class="timeline-step step" data-step="2">
                <div class="step-dot">3</div>
                <div class="step-label">Your Voice</div>
            </div>
            <div class="timeline-step step" data-step="3">
                <div class="step-dot">4</div>
                <div class="step-label">TA Tech</div>
            </div>
            <div class="timeline-step step" data-step="4">
                <div class="step-dot">5</div>
                <div class="step-label">Geo Paris</div>
            </div>
            <div class="timeline-step step" data-step="5">
                <div class="step-dot">6</div>
                <div class="step-label">Wrap Up</div>
            </div>
        </div>

        <div class="card-grid" id="cardGrid">
            </div>

        <div class="controls">
            <button id="startBtn">▶ Start Session</button>
            <button id="pauseBtn" disabled>⏸ Pause</button>
            <button id="resetBtn">↺ Reset</button>
            <button id="autoBtn" onclick="toggleAutoProgression()" title="Toggle auto-progression">🔄 Auto</button>
        </div>
    </div>

    <script>
        // AGENDA DATA - Added startTime property
        const agendas = [
            { id: 0, title: 'Top of Mind', presenter: 'Bhawna', initials: 'BH', photo: 'bhawna.png', duration: 900, color: '#00d4ff', startTime: '13:00' },
            { id: 1, title: 'International P&C Engagement Roadmap', presenter: 'Walaa & Aleksandra', initials: 'WA', photo: 'Walaa photo.jpg', photo2: 'aleksandra.jpg', duration: 1800, color: '#a855f7', startTime: '13:15' },
            { id: 2, title: 'New Your Voice 2026', presenter: 'Lucas', initials: 'LU', photo: 'Lucas Profile Pic.jpeg', duration: 1800, color: '#f97316', startTime: '13:45' },
            { id: 3, title: 'Talent Acquisition Tech Roadmap', presenter: 'Elisa', initials: 'EL', photo: 'elisa.jpg', duration: 1800, color: '#22c55e', startTime: '14:15' },
            { id: 4, title: 'International Geo Meeting Paris', presenter: 'Pedro', initials: 'PE', photo: 'Pedro Pittella-3284.jpg', duration: 600, color: '#ec4899', startTime: '14:45' },
            { id: 5, title: 'Wrap Up', presenter: 'All', initials: 'ALL', photo: null, duration: 300, color: '#eab308', startTime: '14:55' }
        ];

        // CITIES DATA
        const cities = [
            { name: 'Seoul', tz: 'Asia/Seoul' },
            { name: 'Singapore', tz: 'Asia/Singapore' },
            { name: 'Paris', tz: 'Europe/Paris' },
            { name: 'Warsaw', tz: 'Europe/Warsaw' },
            { name: 'Frankfurt', tz: 'Europe/Berlin' },
            { name: 'Istanbul', tz: 'Europe/Istanbul' },
            { name: 'Moscow', tz: 'Europe/Moscow' },
            { name: 'Cairo', tz: 'Africa/Cairo' },
            { name: 'Mexico City', tz: 'America/Mexico_City' },
            { name: 'São Paulo', tz: 'America/Sao_Paulo' },
            { name: 'Buenos Aires', tz: 'America/Argentina/Buenos_Aires' }
        ];

        // TIMER VARIABLES
        let activeId = null;
        let timerInterval = null;
        let isPaused = false;
        let timeLeft = 0;
        let sessionStarted = false;
        let autoProgressionEnabled = true;

        // AVATAR HTML GENERATOR
        function getAvatarHTML(agenda) {
            if (agenda.id === 1) {
                return `
                    <div class="avatar-group">
                        <img src="Walaa photo.jpg" class="avatar-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                        <div class="avatar" style="background:#a855f7; color:#fff; display:none;">WA</div>
                        <img src="aleksandra.jpg" class="avatar-img avatar-img-2" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                        <div class="avatar" style="background:#a855f7; color:#fff; display:none;">AL</div>
                    </div>
                `;
            } else if (agenda.photo) {
                return `
                    <div class="avatar-wrap">
                        <img src="${agenda.photo}" class="avatar-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                        <div class="avatar" style="background:${agenda.color}; color:#000; display:none;">${agenda.initials}</div>
                    </div>
                `;
            } else {
                return `<div class="avatar" style="background:${agenda.color}; color:#000;">${agenda.initials}</div>`;
            }
        }

        // INITIALIZE
        function init() {
            renderClocks();
            renderCards();
            setupEventListeners();
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        // RENDER CLOCKS
        function renderClocks() {
            function getOffset(tz) {
                const now = new Date();
                const tzDate = new Date(now.toLocaleString('en-US', { timeZone: tz }));
                const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
                return Math.round((tzDate - utcDate) / 3600000);
            }

            const groups = {};
            cities.forEach(c => {
                const off = getOffset(c.tz);
                if (!groups[off]) groups[off] = { tz: c.tz, names: [] };
                groups[off].names.push(c.name);
            });

            const container = document.getElementById('clocksContainer');
            Object.values(groups).forEach((group, index) => {
                const widget = document.createElement('div');
                widget.className = 'clock-widget';
                widget.innerHTML = `
                    <svg width="65" height="65">
                        <circle cx="32.5" cy="32.5" r="30" fill="#0d1117" stroke="#00d4ff" stroke-width="1.5"/>
                        <line x1="32.5" y1="5" x2="32.5" y2="10" stroke="#fff" stroke-width="2"/>
                        <line x1="60" y1="32.5" x2="55" y2="32.5" stroke="#fff" stroke-width="2"/>
                        <line x1="32.5" y1="60" x2="32.5" y2="55" stroke="#fff" stroke-width="2"/>
                        <line x1="5" y1="32.5" x2="10" y2="32.5" stroke="#fff" stroke-width="2"/>
                        <line x1="32.5" y1="8" x2="32.5" y2="12" stroke="#fff" stroke-width="1"/>
                        <line x1="53" y1="32.5" x2="57" y2="32.5" stroke="#fff" stroke-width="1"/>
                        <line x1="32.5" y1="57" x2="32.5" y2="53" stroke="#fff" stroke-width="1"/>
                        <line x1="12" y1="32.5" x2="8" y2="32.5" stroke="#fff" stroke-width="1"/>
                        <line x1="47.5" y1="17.5" x2="50.5" y2="14.5" stroke="#fff" stroke-width="1"/>
                        <line x1="47.5" y1="47.5" x2="50.5" y2="50.5" stroke="#fff" stroke-width="1"/>
                        <line x1="17.5" y1="47.5" x2="14.5" y2="50.5" stroke="#fff" stroke-width="1"/>
                        <line x1="17.5" y1="17.5" x2="14.5" y2="14.5" stroke="#fff" stroke-width="1"/>
                        <line id="hour-${index}" x1="32.5" y1="32.5" x2="32.5" y2="20" stroke="white" stroke-width="3" stroke-linecap="round" style="transform-origin: 32.5px 32.5px"/>
                        <line id="min-${index}" x1="32.5" y1="32.5" x2="32.5" y2="12" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" style="transform-origin: 32.5px 32.5px"/>
                        <line id="sec-${index}" x1="32.5" y1="32.5" x2="32.5" y2="10" stroke="#ff4466" stroke-width="1" stroke-linecap="round" style="transform-origin: 32.5px 32.5px"/>
                        <circle cx="32.5" cy="32.5" r="2.5" fill="#00d4ff"/>
                    </svg>
                    <div class="clock-label">${group.names.join(' · ')}</div>
                    <div class="clock-time" id="time-${index}">00:00</div>
                `;
                widget.dataset.tz = group.tz;
                widget.dataset.index = index;
                container.appendChild(widget);
            });
        }

        // UPDATE CLOCKS
        function updateClocks() {
            document.querySelectorAll('.clock-widget').forEach(widget => {
                const tz = widget.dataset.tz;
                const index = widget.dataset.index;
                const now = new Date();
                const local = new Date(now.toLocaleString('en-US', { timeZone: tz }));
                const h = local.getHours() % 12;
                const m = local.getMinutes();
                const s = local.getSeconds();
                const hAngle = h * 30 + m * 0.5;
                const mAngle = m * 6 + s * 0.1;
                const sAngle = s * 6;
                
                const hourEl = document.getElementById('hour-' + index);
                const minEl = document.getElementById('min-' + index);
                const secEl = document.getElementById('sec-' + index);
                const timeEl = document.getElementById('time-' + index);
                
                if (hourEl) hourEl.style.transform = 'rotate(' + hAngle + 'deg)';
                if (minEl) minEl.style.transform = 'rotate(' + mAngle + 'deg)';
                if (secEl) secEl.style.transform = 'rotate(' + sAngle + 'deg)';
                if (timeEl) timeEl.textContent = String(local.getHours()).padStart(2,'0') + ':' + String(m).padStart(2,'0');
            });
        }

        // RENDER CARDS
        function renderCards() {
            const grid = document.getElementById('cardGrid');
            agendas.forEach(a => {
                const minutes = Math.floor(a.duration / 60);
                const card = document.createElement('div');
                card.className = 'card';
                card.id = 'card-' + a.id;
                card.dataset.id = a.id;
                card.dataset.duration = a.duration;
                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-num">${String(a.id + 1).padStart(2, '0')}</span>
                        <span class="card-badge" id="badge-${a.id}">PENDING</span>
                    </div>
                    <div class="card-title">${a.title}</div>
                    <div class="card-presenter">
                        ${getAvatarHTML(a)}
                        <span>${a.presenter}</span>
                    </div>
                    <div class="card-stats">
                        <span class="card-mins">${minutes} min</span>
                        <span class="card-time">${a.startTime} CET</span>
                    </div>
                    <div class="bar-wrap">
                        <div class="bar-bg">
                            <div class="bar-fill" id="fill-${a.id}" style="width:100%; background:${a.color}"></div>
                            <span class="bar-label" id="label-${a.id}">${String(minutes).padStart(2,'0')}:00</span>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => onCardClick(a.id));
                grid.appendChild(card);
            });
        }

        // SETUP EVENT LISTENERS
        function setupEventListeners() {
            document.getElementById('startBtn').addEventListener('click', startSession);
            document.getElementById('pauseBtn').addEventListener('click', togglePause);
            document.getElementById('resetBtn').addEventListener('click', resetAll);
        }

        // START SESSION
        function startSession() {
            sessionStarted = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.querySelectorAll('.card').forEach(c => c.classList.add('enabled'));
        }

        // CARD CLICK
        function onCardClick(id) {
            if (!sessionStarted) return;

            if (activeId === id && !isPaused) return;

            if (activeId === id && isPaused) {
                isPaused = false;
                document.getElementById('pauseBtn').textContent = '⏸ Pause';
                setBadge(id, 'IN PROGRESS', '#00d4ff');
                startCountdown();
                return;
            }

            if (activeId !== null) {
                setBadge(activeId, 'DONE ✓', '#22c55e');
                document.getElementById('card-' + activeId).classList.remove('active','paused');
                document.getElementById('card-' + activeId).classList.add('done');
            }

            clearInterval(timerInterval);
            activeId = id;
            isPaused = false;
            timeLeft = agendas[id].duration;

            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            const card = document.getElementById('card-' + id);
            card.classList.remove('done','paused');
            card.classList.add('active');
            card.style.borderColor = agendas[id].color;
            card.style.boxShadow = '0 0 25px ' + agendas[id].color + '44';

            setBadge(id, 'IN PROGRESS', agendas[id].color);
            updateBar(id, timeLeft);
            updateTimeline(id);
            document.getElementById('pauseBtn').textContent = '⏸ Pause';
            document.getElementById('pauseBtn').disabled = false;
            startCountdown();
        }

        // START COUNTDOWN
        function startCountdown() {
            clearInterval(timerInterval);
            timerInterval = setInterval(function() {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);

                    setBadge(activeId, 'DONE ✓', '#22c55e');
                    document.getElementById('card-' + activeId).classList.remove('active');
                    document.getElementById('card-' + activeId).classList.add('done');
                    document.getElementById('card-' + activeId).style.borderColor = '#22c55e';
                    document.getElementById('card-' + activeId).style.boxShadow = '0 0 15px #22c55e44';
                    updateTimeline(activeId, true);

                    // AUTO-PROGRESSION
                    if (autoProgressionEnabled) {
                        const nextId = activeId + 1;
                        if (nextId < agendas.length) {
                            showAutoProgressCountdown(nextId);
                            setTimeout(function() {
                                onCardClick(nextId);
                            }, 2000);
                        } else {
                            setTimeout(function() {
                                showCompletionMessage();
                            }, 2000);
                        }
                    }

                    return;
                }
                timeLeft--;
                updateBar(activeId, timeLeft);
            }, 1000);
        }

        // SHOW AUTO-PROGRESS COUNTDOWN OVERLAY ON NEXT CARD
        function showAutoProgressCountdown(nextId) {
            const nextCard = document.getElementById('card-' + nextId);
            if (!nextCard) return;

            const existing = nextCard.querySelector('.auto-progress-overlay');
            if (existing) existing.parentNode.removeChild(existing);

            const overlay = document.createElement('div');
            overlay.className = 'auto-progress-overlay';

            let countdown = 2;
            overlay.innerHTML = `
                <div style="font-size: 24px;">▶</div>
                <div style="font-size: 14px; margin-top: 8px;">Starting in ${countdown}s</div>
            `;

            nextCard.appendChild(overlay);

            const countdownInterval = setInterval(function() {
                countdown--;
                if (countdown > 0) {
                    const label = overlay.querySelector('div:last-child');
                    if (label) label.textContent = 'Starting in ' + countdown + 's';
                } else {
                    clearInterval(countdownInterval);
                    if (overlay.parentNode) {
                        overlay.parentNode.removeChild(overlay);
                    }
                }
            }, 1000);
        }

        // SHOW COMPLETION MESSAGE
        function showCompletionMessage() {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: linear-gradient(135deg, #22c55e, #16a34a);
                color: white;
                padding: 20px 40px;
                border-radius: 20px;
                font-size: 18px;
                font-weight: 700;
                box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
                z-index: 1000;
                text-align: center;
            `;
            notification.innerHTML = '🎉 All agendas completed!<br><small style="font-size:14px; opacity:0.9;">Meeting finished successfully</small>';
            document.body.appendChild(notification);

            setTimeout(function() {
                if (notification.parentNode) {
                    notification.parentNode.removeChild(notification);
                }
            }, 4000);
        }

        // TOGGLE AUTO-PROGRESSION
        function toggleAutoProgression() {
            autoProgressionEnabled = !autoProgressionEnabled;
            const btn = document.getElementById('autoBtn');
            if (autoProgressionEnabled) {
                btn.style.background = 'rgba(34, 197, 94, 0.2)';
                btn.style.color = '#22c55e';
                btn.style.borderColor = '#22c55e';
            } else {
                btn.style.background = 'rgba(255, 255, 255, 0.05)';
                btn.style.color = '#aaa';
                btn.style.borderColor = 'rgba(255, 255, 255, 0.1)';
            }
        }

        // UPDATE BAR
        function updateBar(id, remaining) {
            const total = agendas[id].duration;
            const pct = (remaining / total) * 100;
            const fill = document.getElementById('fill-' + id);
            const label = document.getElementById('label-' + id);
            if (!fill || !label) return;
            fill.style.width = pct + '%';
            if (pct > 60) fill.style.background = agendas[id].color;
            else if (pct > 30) fill.style.background = '#f59e0b';
            else fill.style.background = '#ef4444';
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            label.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }

        // TOGGLE PAUSE
        function togglePause() {
            if (activeId === null) return;
            isPaused = !isPaused;
            if (isPaused) {
                clearInterval(timerInterval);
                setBadge(activeId, 'PAUSED', '#f59e0b');
                document.getElementById('card-' + activeId).classList.add('paused');
                document.getElementById('pauseBtn').textContent = '▶ Resume';
            } else {
                document.getElementById('card-' + activeId).classList.remove('paused');
                setBadge(activeId, 'IN PROGRESS', agendas[activeId].color);
                document.getElementById('pauseBtn').textContent = '⏸ Pause';
                startCountdown();
            }
        }

        // RESET ALL
        function resetAll() {
            clearInterval(timerInterval);
            activeId = null;
            isPaused = false;
            timeLeft = 0;
            sessionStarted = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('pauseBtn').textContent = '⏸ Pause';
            agendas.forEach(function(a) {
                const card = document.getElementById('card-' + a.id);
                card.className = 'card';
                card.style.borderColor = '';
                card.style.boxShadow = '';
                const overlay = card.querySelector('.auto-progress-overlay');
                if (overlay) overlay.parentNode.removeChild(overlay);
                setBadge(a.id, 'PENDING', '#888');
                const fill = document.getElementById('fill-' + a.id);
                const label = document.getElementById('label-' + a.id);
                fill.style.width = '100%';
                fill.style.background = a.color;
                const m = Math.floor(a.duration / 60);
                const s = a.duration % 60;
                label.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            });
            document.querySelectorAll('.step').forEach(function(s) {
                s.classList.remove('active','done');
            });
        }

        // SET BADGE
        function setBadge(id, text, color) {
            const badge = document.getElementById('badge-' + id);
            if (!badge) return;
            badge.textContent = text;
            badge.style.color = color;
            badge.style.background = color + '22';
        }

        // UPDATE TIMELINE
        function updateTimeline(id, done) {
            document.querySelectorAll('.step').forEach(function(s, i) {
                s.classList.remove('active','done');
                if (i < id) s.classList.add('done');
                else if (i === id) s.classList.add(done ? 'done' : 'active');
            });
        }

        // INITIALIZE ON LOAD
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
